<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Tour in Paradise | Elite Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0a0a;      
            --card-bg: #121212;      
            --accent: #c59b27;       
            --light: #e6c687;        
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #a37f1e 0%, #e6c687 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--primary); 
            color: var(--white); 
            font-family: 'Montserrat', sans-serif; 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* --- CLASE DE CONTROL DE PÁGINAS --- */
        .hidden { display: none !important; }

        /* --- SISTEMA DE PARTÍCULAS GLOBAL --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none; 
        }

        /* --- PÁGINA 1: LANDING PAGE (BIENVENIDA) --- */
        #landing-page {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: #050505;
        }

        .smoke-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(40, 40, 40, 0.25), transparent 50%),
                radial-gradient(circle at 20% 30%, rgba(30, 30, 30, 0.15), transparent 40%);
            filter: blur(60px);
            animation: smokeMove 20s infinite alternate;
            z-index: 1;
        }

        @keyframes smokeMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(5%, 5%); }
        }

        .landing-content {
            z-index: 2;
            padding: 20px;
            max-width: 950px;
        }

        .landing-content h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 7vw, 4rem);
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 20px;
            color: var(--white);
            text-shadow: 0 0 30px rgba(197, 155, 39, 0.2);
            cursor: pointer;
            transition: 0.3s;
        }
        .landing-content h1:hover {
            color: var(--light);
        }

        .landing-content p.subtitle-gold {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            letter-spacing: 6px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .scroll-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 18px 45px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 0.85rem;
        }

        .scroll-btn:hover {
            background: var(--accent);
            color: var(--primary);
            box-shadow: 0 0 30px rgba(197, 155, 39, 0.3);
        }

        /* --- PÁGINA 2: SECCIÓN CATÁLOGO --- */
        #catalog-page {
            width: 100%;
            min-height: 100vh;
            background-color: var(--primary);
        }

        .catalog-header {
            padding: 60px 20px 20px 20px;
            text-align: center;
            background: #0a0a0a;
        }

        .catalog-header h2 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.5rem, 4vw, 2.3rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 400;
            color: var(--white);
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
        }

        .catalog-header h2:hover {
            color: var(--accent);
        }

        .catalog-header p {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: #666;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .nav-bar { 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            background: rgba(10, 10, 10, 0.96); 
            padding: 25px 0; 
            border-bottom: 1px solid rgba(197, 155, 39, 0.1); 
            display: flex; 
            justify-content: center; 
            gap: 50px;
            backdrop-filter: blur(10px);
        }

        .nav-btn { font-family: 'Cinzel', serif; background: none; border: none; color: var(--white); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px; cursor: pointer; opacity: 0.4; transition: 0.4s; padding-bottom: 5px; }
        .nav-btn.active { opacity: 1; color: var(--accent); border-bottom: 1px solid var(--accent); }

        #catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; padding: 60px 8%; max-width: 1600px; margin: 0 auto; }
        
        .card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.02); overflow: hidden; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; transform: translateY(40px); cursor: pointer; }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        
        .card img { width: 100%; height: 350px; object-fit: cover; background: #000; display: block; filter: grayscale(20%) brightness(85%); transition: 0.8s; }
        .card:hover img { filter: grayscale(0%) brightness(100%); transform: scale(1.03); }

        .card-info { padding: 35px 25px; background: #0d0d0d; text-align: center; border-top: 1px solid rgba(255,255,255,0.01); }
        .card-title { font-family: 'Cinzel', serif; font-size: 1.2rem; margin-bottom: 10px; letter-spacing: 2px; font-weight: 400; }
        .card-price { color: var(--accent); font-family: 'Cinzel', serif; font-weight: 600; font-size: 0.9rem; letter-spacing: 2px; }

        /* MODAL VISTA DETALLADA */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--primary); border: 1px solid rgba(197, 155, 39, 0.2); width: 100%; max-width: 1100px; max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; color: #fff; cursor: pointer; z-index: 10; opacity: 0.5; transition: 0.3s; }
        .modal-close:hover { opacity: 1; color: var(--accent); }
        .modal-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; }
        .modal-gallery img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .modal-details { padding: 55px; background: #0d0d0d; }
        .modal-title { font-family: 'Cinzel', serif; font-size: 2.2rem; margin-bottom: 15px; font-weight: 400; letter-spacing: 1px; }
        .modal-label { font-family: 'Cinzel', serif; color: var(--accent); text-transform: uppercase; font-size: 0.75rem; font-weight: 600; letter-spacing: 3px; margin-top: 30px; display: block; }
        .modal-text { font-size: 0.9rem; color: #b3b3b3; font-weight: 300; margin-top: 5px; line-height: 1.8; }
        .btn-wa { display: block; text-align: center; background: var(--gradient); color: var(--primary); text-decoration: none; padding: 20px; font-family: 'Cinzel', serif; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-top: 40px; transition: 0.4s; }
        .btn-wa:hover { filter: brightness(1.1); box-shadow: 0 10px 20px rgba(197, 155, 39, 0.2); }

        /* LIGHTBOX FULLSCREEN */
        #lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); display: none; justify-content: center; align-items: center; z-index: 3000; }
        #lightbox-overlay img { max-width: 90%; max-height: 90vh; border: 1px solid rgba(197, 155, 39, 0.2); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 900px) { .modal-grid { grid-template-columns: 1fr; } .modal-details { padding: 35px; } .card img { height: 280px; } }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <section id="landing-page">
        <div class="smoke-bg"></div>
        <div class="landing-content">
            <p class="subtitle-gold">Bienvenido a la Élite</p>
            <h1 onclick="showLandingPage()">Adventure Tour in Paradise</h1>
            <p style="color: #fff; opacity: 0.5; font-family: 'Montserrat'; letter-spacing: 3px; font-weight: 300; margin-bottom: 40px;">El mar te espera</p>
            <button class="scroll-btn" onclick="showCatalogPage()">Explorar Colección</button>
        </div>
    </section>

    <div id="catalog-page" class="hidden">
        <header class="catalog-header">
            <h2 onclick="showLandingPage()">Adventure Tour in Paradise</h2>
            <p>El mar te espera</p>
        </header>

        <nav class="nav-bar">
            <button id="btnTour" class="nav-btn active" onclick="filter('tour')">Experiencias</button>
            <button id="btnYate" class="nav-btn" onclick="filter('yate')">Nuestra Flota</button>
        </nav>

        <main id="catalog-grid"></main>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body" class="modal-grid"></div>
        </div>
    </div>

    <div id="lightbox-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Full View">
    </div>

    <script>
        /* --- ARQUITECTURA DE NAVEGACIÓN --- */
        function showCatalogPage() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('catalog-page').classList.remove('hidden');
            window.scrollTo({ top: 0 });
            // Forzamos el renderizado de las tarjetas animadas al entrar
            filter('tour');
        }

        function showLandingPage() {
            document.getElementById('catalog-page').classList.add('hidden');
            document.getElementById('landing-page').classList.remove('hidden');
            closeModal();
            closeLightbox();
        }

        /* --- MOTOR DE PARTÍCULAS INTERACTIVAS (CURSOR) --- */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1.6 - 0.8;
                this.speedY = Math.random() * 1.6 - 0.8;
                this.color = 'rgba(255, 255, 255, 0.75)';
                this.life = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.018; 
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        /* --- CONSUMO DE GOOGLE SHEETS & IMÁGENES --- */
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSEqBgn1LIks5848oxtrZOA4RDT59gnXyE6DGYf4sgAw9hYBLmm7RvpPaqGJQGQbvbXxcdMCCax-1Te/pub?output=tsv';
        const GITHUB_RAW = 'https://raw.githubusercontent.com/beamazingcolors/Adventure-Tour-in-Paradise/main/';

        let fullData = [];

        function getImgUrlByCodigo(item) {
            let codigoValue = item['Codigo'] || item['Código'] || item['Code'] || item['CODE'] || '';
            if (!codigoValue || codigoValue === 'Experiencias' || codigoValue.trim() === '') return '';
            let fileName = codigoValue.trim().toUpperCase().replace(/\.(jpg|jpeg|png)$/i, '') + '.jpg';
            return GITHUB_RAW + encodeURIComponent(fileName);
        }

        async function init() {
            try {
                const response = await fetch(TSV_URL);
                const text = await response.text();
                const rows = text.replace(/\r/g, '').split('\n').filter(r => r.trim() !== '').map(r => r.split('\t'));
                const headers = rows[0].map(h => h.trim());
                
                fullData = rows.slice(1).map(row => {
                    let item = {};
                    headers.forEach((h, i) => {
                        let val = row[i]?.trim();
                        item[h] = (!val || val.toLowerCase() === 'undefined' || val.toLowerCase() === 'null') ? 'Experiencias' : val;
                    });
                    return item;
                });
            } catch (err) { console.error(err); }
        }

        function filter(category) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(category === 'tour' ? 'exp' : 'flota')));
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            
            const filtered = fullData.filter(i => (i['TIPO'] || '').toLowerCase().includes(category));

            filtered.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(item.Nombre);
                
                const img = getImgUrlByCodigo(item);
                const tag = item['Pies'] !== 'Experiencias' ? item['Pies'] + ' Pies' : 'Selección Premium';
                let precio = item['Precio'] || 'Experiencias';
                if (precio.toLowerCase() === 'undefined' || precio.trim() === '') precio = 'Experiencias';

                card.innerHTML = `
                    <img src="${img}" onerror="this.style.opacity='0';">
                    <div class="card-info">
                        <span style="color:var(--accent); font-family:'Cinzel'; font-size:0.7rem; font-weight:600; letter-spacing:2px; text-transform:uppercase;">${tag}</span>
                        <h2 class="card-title">${item.Nombre}</h2>
                        <p class="card-price">${precio}</p>
                    </div>
                `;
                grid.appendChild(card);
                setTimeout(() => card.classList.add('visible'), idx * 60);
            });
        }

        function openModal(nombre) {
            const item = fullData.find(i => i.Nombre === nombre);
            const body = document.getElementById('modal-body');
            
            let precio = item.Precio;
            if (!precio || precio.toLowerCase() === 'undefined' || precio.trim() === '') precio = 'Experiencias';
            let desc = item['Descriptivo'] !== 'Experiencias' ? item['Descriptivo'] : (item['Detalles'] !== 'Experiencias' ? item['Detalles'] : 'Experiencias');
            
            const img = getImgUrlByCodigo(item);

            body.innerHTML = `
                <div class="modal-gallery">
                    <img src="${img}" onclick="openLightbox('${img}')" title="Click para expandir" onerror="this.style.opacity='0';">
                </div>
                <div class="modal-details">
                    <span class="modal-label">Propuesta Exclusiva</span>
                    <h1 class="modal-title">${item.Nombre}</h1>
                    <p class="card-price" style="font-size:1.6rem;">${precio}</p>
                    
                    <span class="modal-label">Sobre la Experiencia</span>
                    <p class="modal-text">${desc}</p>
                    
                    ${item['Capacidad de personas'] !== 'Experiencias' ? `<span class="modal-label">Capacidad</span><p class="modal-text">${item['Capacidad de personas']}</p>` : ''}
                    
                    <span class="modal-label">Incluye</span>
                    <div style="background:rgba(197,155,39,0.04); border-left:2px solid var(--accent); padding:20px; font-size:0.85rem; margin-top:12px; color:#cccccc; font-weight:300;">
                        ${item['Incluye:'] !== 'Experiencias' ? item['Incluye:'] : 'Servicio Premium de Concierge incluido.'}
                    </div>
                    
                    <a href="https://wa.me/message/CAXOJF3WZUTMG1" target="_blank" class="btn-wa">Reservar ahora</a>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openLightbox(src) {
            const overlay = document.getElementById('lightbox-overlay');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            overlay.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox-overlay').style.display = 'none';
        }

        // Carga silenciosa de la base de datos al entrar a la web
        init();
    </script>
</body>
</html>
